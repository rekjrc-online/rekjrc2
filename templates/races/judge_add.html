{% extends "base.html" %}
{% block content %}
<!-- races/judge_add.html -->

<div class="panel">
    <center>
        <h1>Add Judge</h1>
        <h2>{{ race }}</h2>
        <!-- Hidden form to submit the QR data -->
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="qr_data" id="qr_data">
            <button type="submit" id="submit_btn" style="display:none;">Submit</button>
        </form>
        <div id="reader" style="width: 100%; height: 100%;"></div>
        <p id="status"></p>
        <br />
        <h2>Tell them to go here</h2>
        <img src="/static/rekjrc_accounts_qr.png" style="width: 100%; height: 100%;" />
    </center>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    const status = document.getElementById("status");
    const qrInput = document.getElementById("qr_data");
    const submitBtn = document.getElementById("submit_btn");
    let formSubmitting = false;

    function onScanSuccess(decodedText) {
        if (formSubmitting) return;
        formSubmitting = true;
        let data;
        try {
            data = JSON.parse(decodedText);
        } catch (e) {
            status.textContent = "Invalid QR code";
            formSubmitting = false;
            return;
        }
        alerttext="ID: "+data.id+"\n"+
                "NAME: "+data.first_name+" "+data.last_name+"\n"+
                "EMAIL: "+data.email+"\n"+
                "PHONE: "+data.phone;
        if(confirm("ADD JUDGE TO RACE\n"+alerttext+"\n\nAre you sure?")) {
            qrInput.value = decodedText;
            submitBtn.click();
        } else {
            formSubmitting=false;
        }
    }

    new Html5Qrcode("reader").start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
</script>

{% endblock %}
