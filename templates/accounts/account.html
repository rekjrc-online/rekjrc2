{% extends "base.html" %}
{% block content %}
<!-- account.html -->
<div class="panel" style="text-align: center;">
    <h3>My Account</h3>
</div>
<div class="panel"><br />
    <form method="post">
        {% csrf_token %}
        <table align="center" cellpadding="5" cellspacing="0">
            {% for field in form %}
            <tr>
                <td>{{ field.label_tag }}</td>
                <td>{{ field }}</td>
            </tr>
            {% endfor %}
            <tr>
                <td colspan="2">
                    <br />
                    <button type="submit">Save Changes</button>
                </td>
            </tr>
        </table>
    </form>
</div>
<div class="panel">
    <center>
        <h3>My QR Code</h3>
        <a href="/media/qrcodes/users/{{ user.profile.uuid }}.png">
            <img src="/media/qrcodes/users/{{ user.profile.uuid }}.png" style="width: 100%; height: 100%; object-fit: cover;" />
        </a>
    </center>
</div>
{% endblock %}
